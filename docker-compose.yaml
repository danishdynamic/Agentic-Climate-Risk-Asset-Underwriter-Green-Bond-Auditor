version: '4.78'

services:
  risk-db:
    image: pgvector/pgvector:pg16
    container_name: risk_analytics_db_instance
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_risk_pass}
      POSTGRES_DB: ${POSTGRES_DB:-risk_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d risk_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local